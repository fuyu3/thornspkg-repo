# glib-2.88.2 — biblioteca utilitária central do GNOME
# Receita baseada em:
#   https://www.linuxfromscratch.org/blfs/view/systemd/general/glib2.html
# Deps Recommended (agora com receitas neste conjunto): libxslt, docutils.
# NOTA: o BLFS manda construir com `-D introspection=disabled` no primeiro
# passo e depois instalar gobject-introspection como receita separada.
# Vamos pela segunda abordagem — veja gobject-introspection-1.86.0.toml.

name         = "glib"
version      = "2.88.2"
description  = "Biblioteca utilitária central do GNOME (GObject, GIO, GModule, etc.)"
homepage     = "https://docs.gtk.org/glib/"
license      = "LGPL-2.1-or-later"
maintainer   = "BLFS <blfs-discuss@lists.linuxfromscratch.org>"
repository   = "blfs"
architecture = "x86_64"

# libxslt e docutils são Recommended pelo BLFS — agora com receitas locais.
depends       = ["libxslt", "docutils"]
optional_deps = []

source  = "https://download.gnome.org/sources/glib/2.88/glib-2.88.2.tar.xz"
sha256  = "cf3f215a640c8a4257f14317586b8f1fdd25a10a93cb4bdda147c0f9ad88e74f"

# BLFS:
#   mkdir build && cd build
#   meson setup .. --prefix=/usr --buildtype=release \
#       -D introspection=disabled -D glib_debug=disabled \
#       -D man-pages=enabled -D sysprof=disabled
#   ninja
#   ninja install
build_system   = "meson"
configure_args = [
    "--buildtype=release",
    "-D introspection=disabled",
    "-D glib_debug=disabled",
    "-D man-pages=enabled",
    "-D sysprof=disabled",
]

post_install = ["ldconfig"]
