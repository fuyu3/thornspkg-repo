# linux-pam-1.7.2 — Linux Pluggable Authentication Modules
# Receita baseada em:
#   https://www.linuxfromscratch.org/blfs/view/systemd/postlfs/linux-pam.html
# Sem deps obrigatórias externas. Recomendado para Systemd rebuild (pam_systemd).

name         = "linux-pam"
version      = "1.7.2"
description  = "Linux Pluggable Authentication Modules — sistema de autenticação flexível"
homepage     = "https://github.com/linux-pam/linux-pam"
license      = "BSD-3-Clause"
maintainer   = "BLFS <blfs-discuss@lists.linuxfromscratch.org>"
repository   = "blfs"
architecture = "x86_64"

# Sem deps externas obrigatórias.
# Optional: docbook-xml/xsl, libxslt, lynx — para documentação (não incluídos).
depends       = []
optional_deps = []

source  = "https://github.com/linux-pam/linux-pam/releases/download/v1.7.2/Linux-PAM-1.7.2.tar.xz"
sha256  = "3d86b6383fb5fd9eb9578d2cd47d92801191f4bf3f9bc61419bfefc8aa1e531a"

# BLFS:
#   mkdir build && cd build
#   meson setup .. --prefix=/usr --buildtype=release -D docdir=/usr/share/doc/Linux-PAM-1.7.2
#   ninja
#   ninja install
build_system   = "meson"
configure_args = [
    "--buildtype=release",
    "-D docdir=/usr/share/doc/Linux-PAM-1.7.2",
]

# Cria /etc/pam.d/other mínimo para primeiro-install (necessário para testes)
pre_build = [
    """install -v -m755 -d /etc/pam.d 2>/dev/null || true""",
    """[ -f /etc/pam.d/other ] || cat > /etc/pam.d/other << 'EOF'
auth required pam_deny.so
account required pam_deny.so
password required pam_deny.so
session required pam_deny.so
EOF""",
]

post_install = ["ldconfig"]
