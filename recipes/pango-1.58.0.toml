# pango-1.58.0 — biblioteca de layout e renderização de texto
# Receita baseada em:
#   https://www.linuxfromscratch.org/blfs/view/systemd/x/pango.html
# Deps Required: fontconfig (com freetype+harfbuzz), fribidi, glib (com gobject-introspection).
# Recommended: cairo (com harfbuzz), xorg libs.

name         = "pango"
version      = "1.58.0"
description  = "Biblioteca de layout e renderização de texto — base para gtk, etc."
homepage     = "https://www.pango.org/"
license      = "LGPL-2.1-or-later"
maintainer   = "BLFS <blfs-discuss@lists.linuxfromscratch.org>"
repository   = "blfs"
architecture = "x86_64"

depends       = ["fontconfig", "freetype", "harfbuzz", "fribidi", "glib", "gobject-introspection", "cairo"]
optional_deps = []

source  = "https://download.gnome.org/sources/pango/1.58/pango-1.58.0.tar.xz"
sha256  = "bc5bad6213ad4886a47d1e80292fd850b64159b50db67917a43d9ea80ee2298a"

# BLFS:
#   mkdir build && cd build
#   meson setup --prefix=/usr --buildtype=release --wrap-mode=nofallback -D introspection=enabled ..
#   ninja
#   ninja install
build_system   = "meson"
configure_args = [
    "--buildtype=release",
    "--wrap-mode=nofallback",
    "-D introspection=enabled",
]

install_steps = [
    "make install",
    "rm -f $DESTDIR/usr/share/info/dir 2>/dev/null || true",
]

post_install = ["ldconfig"]
