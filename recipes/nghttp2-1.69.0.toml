# nghttp2-1.69.0 — biblioteca HTTP/2
# Receita baseada em:
#   https://www.linuxfromscratch.org/blfs/view/systemd/basicnet/nghttp2.html
# Sem deps obrigatórias. BLFS Recommended: libxml2 (assumido presente em LFS/BLFS).
# BLFS usa --enable-lib-only porque só precisa da libnghttp2 para curl.

name         = "nghttp2"
version      = "1.69.0"
description  = "Biblioteca HTTP/2 com implementação de referência (lib-only)"
homepage     = "https://nghttp2.org/"
license      = "MIT"
maintainer   = "BLFS <blfs-discuss@lists.linuxfromscratch.org>"
repository   = "blfs"
architecture = "x86_64"

# libxml2 é Recommended pelo BLFS — agora com receita neste conjunto.
depends       = ["libxml2"]
optional_deps = []

source  = "https://github.com/nghttp2/nghttp2/releases/download/v1.69.0/nghttp2-1.69.0.tar.xz"
sha256  = "1fb324b6ec2c56f6bde0658f4139ffd8209fa9e77ce98fd7a5f63af8d0e508ad"

build_system   = "autotools"
configure_args = [
    "--disable-static",
    "--enable-lib-only",
    "--docdir=/usr/share/doc/nghttp2-1.69.0",
]

post_install = ["ldconfig"]
