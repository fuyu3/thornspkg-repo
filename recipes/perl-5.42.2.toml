# perl-5.42.2 — linguagem de script Perl 5
# Receita baseada em:
#   https://www.linuxfromscratch.org/lfs/view/systemd/chapter08/perl.html
# Deps: zlib, bzip2 (para Compress::Raw::Zlib e Compress::Raw::BZip2 usarem
# as libs do sistema em vez das internas).
#
# AVISO: o build do Perl é lento (~10-30 min). Compila extensões C/XS para
# milhares de módulos.

name         = "perl"
version      = "5.42.2"
description  = "Linguagem de script Perl 5 — usada por OpenSSL (build), autotools, etc."
homepage     = "https://www.perl.org/"
license      = "GPL-1.0-or-later OR Artistic-1.0-Perl"
maintainer   = "LFS"
repository   = "lfs-base"
architecture = "x86_64"

# Usa zlib e bzip2 do sistema (em vez das cópias internas)
depends       = ["zlib", "bzip2", "gdbm"]
optional_deps = []

source  = "https://www.cpan.org/src/5.0/perl-5.42.2.tar.xz"
sha256  = "a26a54aef777d51287061a332a565e209c596e5397d16b665c9131075c8432c5"

# LFS: exporta 2 variáveis de ambiente para usar libs do sistema
pre_build = []

# LFS:
#   export BUILD_ZLIB=False
#   export BUILD_BZIP2=0
#   sh Configure -des \
#       -D prefix=/usr -D vendorprefix=/usr \
#       -D privlib=... -D archlib=... -D sitelib=... -D sitearch=... \
#       -D vendorlib=... -D vendorarch=... \
#       -D man1dir=... -D man3dir=... \
#       -D pager="/usr/bin/less -isR" -D useshrplib -D usethreads
#   make
#   make install
build_system = "custom"
steps = [
    """export BUILD_ZLIB=False && export BUILD_BZIP2=0 && \\
    sh Configure -des \\
        -D prefix=/usr \\
        -D vendorprefix=/usr \\
        -D privlib=/usr/lib/perl5/5.42/core_perl \\
        -D archlib=/usr/lib/perl5/5.42/core_perl \\
        -D sitelib=/usr/lib/perl5/5.42/site_perl \\
        -D sitearch=/usr/lib/perl5/5.42/site_perl \\
        -D vendorlib=/usr/lib/perl5/5.42/vendor_perl \\
        -D vendorarch=/usr/lib/perl5/5.42/vendor_perl \\
        -D man1dir=/usr/share/man/man1 \\
        -D man3dir=/usr/share/man/man3 \\
        -D pager="/usr/bin/less -isR" \\
        -D useshrplib \\
        -D usethreads""",
    "make",
]
install_steps = ["make install"]

post_install = ["ldconfig"]
