# Receita remota de exemplo — ripgrep
# Demonstra receita para pacote Rust (build_system=custom com cargo).

name         = "ripgrep"
version      = "14.1.0"
description  = "Busca recursiva rápida (alternativa ao grep)"
homepage     = "https://github.com/BurntSushi/ripgrep"
license      = "MIT"
maintainer   = "Andrew Gallant <jamslam@example.org>"
repository   = "local"
architecture = "x86_64"

# ripgrep não tem deps de runtime, mas precisa de cargo em build-time
depends      = []

source       = "https://github.com/BurntSushi/ripgrep/archive/14.1.0.tar.gz"
# sha256 = "preencha com: sha256sum ripgrep-14.1.0.tar.gz"

# Pacotes Rust usam `cargo` em vez de autotools
build_system = "custom"
steps = [
    # Os paths abaixo são ilustrativos — ajuste conforme a estrutura do source.
    "cargo build --release --locked",
]
install_steps = [
    # Em sistemas LFS, normalmente: install -Dm755 target/release/rg $DESTDIR/usr/bin/rg
    "install -Dm755 target/release/rg $DESTDIR/usr/bin/rg",
    "install -Dm644 complete/_rg $DESTDIR/usr/share/zsh/site-functions/_rg",
    "install -Dm644 doc/rg.1 $DESTDIR/usr/share/man/man1/rg.1",
]

# Manpage e completion são instaladas manualmente nos install_steps acima.
post_install = ["mandb -q || true"]
